<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Prefill vs Decode</title>
  <desc id="desc">A diagram comparing the parallel prefill phase with the sequential decode phase.</desc>
  <rect width="720" height="420" rx="28" fill="#f8fbfd"/>
  <rect x="24" y="24" width="672" height="372" rx="24" fill="#ffffff" stroke="#c7d2da" stroke-width="2"/>
  <text x="48" y="70" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#0b4667">Prefill vs Decode</text>
  <text x="48" y="98" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16" fill="#5d6b79">Why long prompts and long generations stress different parts of the system.</text>

  <rect x="48" y="132" width="280" height="220" rx="20" fill="#dcebf4" stroke="#8ab0c5" stroke-width="2"/>
  <text x="72" y="170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#0b4667">Prefill</text>
  <text x="72" y="196" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" fill="#35556d">Whole prompt processed together</text>
  <rect x="76" y="224" width="44" height="86" rx="10" fill="#0f5f8c"/>
  <rect x="128" y="204" width="44" height="106" rx="10" fill="#2e7fa6"/>
  <rect x="180" y="186" width="44" height="124" rx="10" fill="#5299bc"/>
  <rect x="232" y="164" width="44" height="146" rx="10" fill="#82b9d2"/>
  <text x="72" y="334" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" fill="#35556d">Compute-bound, high parallelism, affects TTFT.</text>

  <rect x="392" y="132" width="280" height="220" rx="20" fill="#fff2ea" stroke="#e0b59c" stroke-width="2"/>
  <text x="416" y="170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#9a5a0a">Decode</text>
  <text x="416" y="196" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" fill="#7a5c39">One token step after another</text>
  <circle cx="438" cy="260" r="20" fill="#d17b3f"/>
  <circle cx="498" cy="260" r="20" fill="#d17b3f"/>
  <circle cx="558" cy="260" r="20" fill="#d17b3f"/>
  <circle cx="618" cy="260" r="20" fill="#d17b3f"/>
  <path d="M458 260h20M518 260h20M578 260h20" stroke="#9a5a0a" stroke-width="6" stroke-linecap="round"/>
  <text x="416" y="334" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" fill="#7a5c39">Memory-bandwidth-bound, affects output rate and total latency.</text>
</svg>
